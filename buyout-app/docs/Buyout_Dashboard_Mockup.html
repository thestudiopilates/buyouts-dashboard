 * These encode the operational rules that drive the dashboard's
 * visual urgency system — green/yellow/red at a glance.
 * ══════════════════════════════════════════════════════════════════ */

/* Date formatters — eventDate sourced from date_mkzjkm1t (Finalized Class Date) */
const fmt = d => d ? new Date(d+"T12:00:00").toLocaleDateString("en-US",{month:"short",day:"numeric"}) : "\u2014";
const fmtFull = d => d ? new Date(d+"T12:00:00").toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric",year:"numeric"}) : "TBD";

/* Money formatter — used for numeric_mkzj1sfj (Total), numeric_mm1v48qj (Paid),
 * numeric_mm1v472d (Deposit), formula_mm1v17wd (Remaining Balance) */
const money = n => typeof n==="number" && n > 0 ? `$${n.toLocaleString()}` : (n===0 ? "$0" : "\u2014");

/* Days until event — calculates from today vs date_mkzjkm1t.
 * In production, replace hardcoded "2026-03-27" with new Date() */
const daysTo = d => { if(!d) return null; return Math.ceil((new Date(d)-new Date("2026-03-27"))/(864e5)); };

/* BALL IN COURT color — maps "Ball In Court" status column on board
 * Values: "TSP Team" (seaglass/green), "Client" (terracotta/red), "Both" (sage)
 * Used in: Row waiting-on badge, DetailPanel header pills */
const bicColor = b => b==="TSP Team"?C.seaglass : b==="Client"?C.terracotta : C.sage;

/* TRACKING HEALTH color — maps "How's it Tracking?" status column
 * Board column: color_mkzjdr77 (known bug: "v" instead of "No" for negative label)
 * Values: "So far so good" (idx 0), "Running behind" (idx 1), "Major issue" (idx 2), "Complete" (idx 5)
 * NOTE: Default currently set to idx 5 ("Complete") for new items — should be idx 0. See CLAUDE.md. */
const trackColor = t => t==="So far so good"?C.seaglass : t==="Running behind"?C.sunshine : t==="Major issue"?C.cherry : t==="Complete"?C.sky : C.warmGrey;

const pCalc = (a,b) => b > 0 ? Math.round(a/b*100) : 0;

/* COUNTDOWN URGENCY — circle badge color logic
 * Derived from daysTo(date_mkzjkm1t). Drives the countdown column in the table.
 * Thresholds: 14+ days = seaglass (all good), 7-13 = sunshine (heads up),
 *             4-6 = terracotta (getting close), 0-3 = cherry + glow (urgent).
 * null/past = greyed out. Glow shadow at <=3 days for visual alarm. */
const countdownColor = days => {
  if(days === null) return {bg:C.warmGrey+"22", fg:C.warmGrey};
  if(days < 0) return {bg:C.warmGrey+"22", fg:C.warmGrey};
  if(days <= 3) return {bg:C.cherry, fg:C.white};
  if(days <= 6) return {bg:C.terracotta, fg:C.white};
  if(days <= 13) return {bg:C.sunshine, fg:C.coffee};
  return {bg:C.seaglass, fg:C.white};
};

/* STATUS TEXT color — used on the status badge in each Row.
 * Reads from "How's it Tracking?" to color-code the "Where Are We Now" label.
 * This cross-references two board columns for visual clarity. */
const statusColor = track => {
  if(track === "So far so good") return C.seaglass;
  if(track === "Running behind") return C.apricot;
  if(track === "Major issue") return C.cherry;
  if(track === "Complete") return C.sky;
  return C.coffee;
};

/* DUE-NEXT URGENCY — colors the "Next Action" text in each Row.
 * dw = days waiting (how long since the last action was taken).
 * >5 days = cherry (overdue), 3-5 = apricot (watch), <3 = seaglass (fresh).
 * In production: derive from lastAction date vs today, not static dw field. */
const dueColor = dw => {
  if(dw > 5) return C.cherry;
  if(dw > 2) return C.apricot;
  return C.seaglass;
};

/* WORKFLOW PROGRESS — counts checked items across 16 Yes/No status columns.
 * Each key in the workflow object maps to a Monday Yes/No column (see WORKFLOW_STEPS).
 * wfPct drives the "Progress" column bar in the table and the Checklist tab header. */
const wfDone = wf => Object.values(wf).filter(Boolean).length;
const wfTotal = wf => Object.values(wf).length;
const wfPct = wf => Math.round(wfDone(wf)/wfTotal(wf)*100);

/* EVENT TYPE badge — cosmetic only, not tied to a board column.
 * Could be derived from a future "Event Type" dropdown column. */
const typeStyle = t => {
  if(t==="Birthday") return {bg:C.sunshine+"1A", fg:C.sunshine};
  if(t==="Corporate") return {bg:C.seaglass+"1A", fg:C.seaglass};
  if(t==="Bachelorette") return {bg:C.terracotta+"1A", fg:C.terracotta};
  return {bg:C.sage+"1A", fg:C.sage};
};

/* TEMPLATE VARIABLE READINESS — used in Emails tab.
 * Checks whether all required board columns are populated for a given template.
 * This is the pre-send validation that Make.com currently LACKS (see CLAUDE.md §Issues).
 *
 * km maps human-readable variable names → templateVars keys → board column IDs:
 *   "Client First Name" → clientFirstName → item name (first word parsed)
 *   "Event Date"        → eventDate       → date_mkzjkm1t
 *   "Location"          → location        → dropdown_mkzjkhds
 *   "Instructor"        → instructor      → text_mkzg27y9
 *   "Total Price"       → totalPrice      → numeric_mkzj1sfj
 *   "Deposit Amount"    → depositAmount   → numeric_mm1v472d
 *   "Deposit Link"      → depositLink     → link_mkzjmvqw
 *   "Signup Link"       → signupLink      → link_mkzg7k99
 *   "Remaining Balance" → remainingBalance → formula_mm1v17wd
 *   "Remaining Balance Link" → remainingBalanceLink → link_mkzjsm8r
 *   "Amount Paid"       → amountPaid      → numeric_mm1v48qj
 *   "Number of Hours"   → numberOfHours   → formula_mm1v4p39
 *   "Start Time"        → startTime       → hour_mm0rahy6
 *   "End Time"          → endTime         → hour_mm0rrxfq
 *
 * Returns: { filled, total, ready } — ready=true means all vars populated, safe to send.
 * In production: should abort Make.com send if ready=false (planned validation). */
const varReady = (tmpl, tv) => {
  const km = {"Client First Name":"clientFirstName","Preferred Date":"preferredDate","Preferred Location":"preferredLocation","Event Date":"eventDate","Start Time":"startTime","End Time":"endTime","Location":"location","Instructor":"instructor","Total Price":"totalPrice","Deposit Amount":"depositAmount","Deposit Link":"depositLink","Signup Link":"signupLink","Remaining Balance":"remainingBalance","Remaining Balance Link":"remainingBalanceLink","Amount Paid":"amountPaid","Number of Hours":"numberOfHours"};
  let filled = 0;
  tmpl.requiredVars.forEach(v => { if(km[v] && tv[km[v]]) filled++; });
  return { filled, total:tmpl.requiredVars.length, ready:filled===tmpl.requiredVars.length };
};

/* ══════════════════════════════════════════════════════════════════
 * SHARED UI COMPONENTS
 * Reusable pieces: progress bar, lifecycle strip, KPI card.
 * ══════════════════════════════════════════════════════════════════ */

/* Bar — horizontal progress indicator. Used for:
 *   - Sign-up fill (signups vs cap from Momence / manual)
 *   - Workflow checklist % (16 Yes/No columns)
 *   - Payment progress (numeric_mm1v48qj / numeric_mkzj1sfj)
 *   - Email send progress (emailsSent.length / 14) */
const Bar = ({val, color, h}) => (
  <div style={{width:"100%",height:h||4,borderRadius:99,background:C.divider,overflow:"hidden"}}>
    <div style={{width:`${Math.min(val,100)}%`,height:"100%",borderRadius:99,background:color||C.terracotta,transition:"width .3s"}} />
  </div>
);

/* Lifecycle — 12-segment progress strip.
 * Maps "Where Are We Now" status index → visual step (see stepMap above).
 * Segments: past=seaglass, current=terracotta, future=divider.
 * Shown in Row (below status badge) and DetailPanel (status strip). */
const Lifecycle = ({step}) => (
  <div style={{display:"flex",gap:2,marginTop:4}}>
    {STEPS.map((_,i) => (
      <div key={i} title={STEPS[i]} style={{height:3,flex:1,borderRadius:2,background:i < step ? C.seaglass : i===step ? C.terracotta : C.divider}} />
    ))}
  </div>
);

/* KPI — top-of-dashboard summary cards.
 * Aggregated from BUYOUTS array; in production, from board API query.
 * accent bar = top 3px color strip for at-a-glance priority. */
const KPI = ({label,value,sub,accent}) => (
  <div style={{background:C.card,borderRadius:16,padding:"20px 22px",flex:1,minWidth:135,position:"relative",overflow:"hidden",border:`1px solid ${C.divider}55`}}>
    <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:accent}} />
    <div style={{fontSize:10,color:C.warmGrey,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2}}>{label}</div>
    <div style={{fontSize:28,fontWeight:700,fontFamily:hf,color:C.coffee,marginTop:6,lineHeight:1}}>{value}</div>
    {sub && <div style={{fontSize:11,color:C.warmGrey,marginTop:8}}>{sub}</div>}
  </div>
);

/* ══════════════════════════════════════════════════════════════════
 * TABLE ROW — one row per buyout item
 * 7-column CSS Grid (.grid-row): Client | Status | Next Action | Waiting On | Countdown | Sign-Ups | Progress
 *
 * BOARD COLUMN MAP per cell:
 *   Client      → item name + assignedTo (new col needed) + Ball In Court status
 *   Status      → "Where Are We Now" status col (si index → Lifecycle step)
 *                  colored by "How's it Tracking?" (color_mkzjdr77)
 *   Next Action → "What's Due Next" status col + days waiting (derived from lastAction)
 *   Waiting On  → "Ball In Court" status col (TSP Team / Client / Both)
 *   Countdown   → days until date_mkzjkm1t, color-coded by urgency thresholds
 *   Sign-Ups    → Momence data: current signups / class capacity (manual or API)
 *   Progress    → 16 workflow Yes/No columns → percentage complete
 * ══════════════════════════════════════════════════════════════════ */
const Row = ({b, selected, onSelect}) => {
  const days = daysTo(b.eventDate);
  const wp = wfPct(b.workflow);
  const fill = b.cap > 0 ? pCalc(b.signups, b.cap) : -1;
  const ts = typeStyle(b.eventType);
  const cd = countdownColor(days);
  const sc = statusColor(b.track);
  const dc = dueColor(b.dw);

  return (
    <div className="grid-row" onClick={() => onSelect(b)}
      style={{padding:"14px 24px",cursor:"pointer",background:selected?C.terracottaLight:C.card,borderBottom:`1px solid ${C.divider}44`,transition:"background .1s"}}
      onMouseEnter={e => {if(!selected) e.currentTarget.style.background = C.oatLight;}}
      onMouseLeave={e => {if(!selected) e.currentTarget.style.background = C.card;}}>

      {/* CLIENT */}
      <div style={{display:"flex",alignItems:"center",gap:12,minWidth:0}}>
        <div style={{width:40,height:40,borderRadius:10,background:bicColor(b.bic)+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
          <span style={{fontFamily:hf,fontSize:16,fontWeight:700,color:bicColor(b.bic)}}>{b.name[0]}</span>
        </div>
        <div style={{minWidth:0}}>
          <div style={{fontFamily:hf,fontWeight:700,fontSize:14,color:C.coffee,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{b.name}</div>
          <div style={{display:"flex",alignItems:"center",gap:6,marginTop:3}}>
            <span style={{padding:"2px 7px",borderRadius:5,fontSize:10,fontWeight:600,background:ts.bg,color:ts.fg,whiteSpace:"nowrap"}}>{b.eventType}</span>
            <span style={{fontSize:10,color:C.warmGrey,whiteSpace:"nowrap"}}>{b.assignedTo}</span>
          </div>
        </div>
      </div>

      {/* STATUS — color matches tracking health */}
      <div style={{minWidth:0}}>
        <div style={{padding:"4px 10px",borderRadius:6,background:sc+"14",display:"inline-block",maxWidth:"100%"}}>
          <span style={{fontSize:11,fontWeight:600,color:sc,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",display:"block"}}>{b.status}</span>
        </div>
        <Lifecycle step={getStep(b.si)} />
      </div>

      {/* NEXT ACTION — green if fresh, yellow if waiting, red if overdue */}
      <div style={{minWidth:0}}>
        <div style={{fontSize:12,fontWeight:600,color:dc,lineHeight:1.35}}>{b.dueNext}</div>
        {b.dw > 0 && (
          <span style={{display:"inline-block",marginTop:3,padding:"1px 6px",borderRadius:4,fontSize:9,fontWeight:700,background:dc+"14",color:dc}}>
            {b.dw}d waiting
          </span>
        )}
      </div>

      {/* WAITING ON */}
      <div>
        <span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:8,background:bicColor(b.bic)+"14",fontSize:11,fontWeight:600,color:bicColor(b.bic),whiteSpace:"nowrap"}}>
          <span style={{width:6,height:6,borderRadius:"50%",background:bicColor(b.bic),flexShrink:0}} />
          {b.bic === "TSP Team" ? "Us" : b.bic}
        </span>
      </div>

      {/* COUNTDOWN — circle badge, green→yellow→terracotta→red */}
      <div style={{display:"flex",justifyContent:"center",alignItems:"center"}}>
        {days === null ? (
          <div style={{width:36,height:36,borderRadius:"50%",background:C.warmGrey+"22",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>
            <span style={{fontSize:10,fontWeight:700,color:C.warmGrey,lineHeight:1,display:"block",marginTop:0}}>TBD</span>
          </div>
        ) : days < 0 ? (
          <div style={{width:36,height:36,borderRadius:"50%",background:C.warmGrey+"22",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>
            <span style={{fontSize:10,fontWeight:700,color:C.warmGrey,lineHeight:1,display:"block"}}>Past</span>
          </div>
        ) : (
          <div style={{width:36,height:36,borderRadius:"50%",background:cd.bg,display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1,boxShadow:days<=3?`0 0 10px ${C.cherry}40`:"none"}}>
            <span style={{fontFamily:hf,fontSize:days===0?14:16,fontWeight:700,color:cd.fg,lineHeight:1,display:"block",paddingTop:1}}>{days === 0 ? "!" : days}</span>
          </div>
        )}
      </div>

      {/* SIGN-UPS — green=full, yellow=getting there, red=low */}
      <div>
        {fill >= 0 ? (
          <div>
            <div style={{fontSize:12,fontWeight:700,color:fill>=100?C.seaglass:fill<50?C.cherry:C.coffee,marginBottom:3}}>{b.signups}<span style={{fontWeight:400,color:C.warmGrey,fontSize:10}}>/{b.cap}</span></div>
            <Bar val={fill} color={fill>=100?C.seaglass:fill>=70?C.sage:fill>=50?C.sunshine:C.cherry} h={4} />
          </div>
        ) : <span style={{fontSize:11,color:C.warmGrey}}>&mdash;</span>}
      </div>

      {/* CHECKLIST PROGRESS — green=done, graduated otherwise */}
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:13,fontWeight:700,color:wp>=100?C.seaglass:wp>=50?C.coffee:C.warmGrey,marginBottom:3}}>{wp}<span style={{fontSize:9,fontWeight:500}}>%</span></div>
        <Bar val={wp} color={wp>=100?C.seaglass:wp>=50?C.sage:C.warmGrey} h={4} />
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════════

 * Opens on Row click. 4 tabs: Overview, Checklist, Emails, Financials.

 *

              <span style={{padding:"2px 8px",borderRadius:6,fontSize:10,fontWeight:600,background:"rgba(255,255,255,.15)",color:C.oat}}>{b.eventType}</span>

            )}

            <div style={{fontSize:10,color:C.terracotta,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Contact</div>
            <div style={{background:C.oatLight,borderRadius:10,padding:"12px 16px",marginBottom:18}}>
              <div style={{fontSize:12,fontWeight:600,color:C.coffee}}>{b.clientEmail}</div>
              {b.phone && <div style={{fontSize:11,color:C.warmGrey,marginTop:2}}>{b.phone}</div>}
              {b.ccEmails && <div style={{fontSize:11,color:C.warmGrey,marginTop:2}}>CC: {b.ccEmails}</div>}
            </div>

            <div style={{fontSize:10,color:C.terracotta,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:6}}>Notes</div>
            <div style={{background:C.oatLight,borderRadius:10,padding:"12px 16px",fontSize:12,color:C.coffee,lineHeight:1.6,minHeight:50,fontStyle:b.notes?"normal":"italic"}}>
              {b.notes || "No notes yet"}
            </div>
          </div>
        )}

        {/* CHECKLIST */}
        {tab === "checklist" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                <span style={{fontFamily:hf,fontSize:22,fontWeight:700,color:C.coffee}}>{wfDone(b.workflow)}</span>
                <span style={{fontSize:12,color:C.warmGrey}}>of {wfTotal(b.workflow)} complete</span>
              </div>
              <span style={{padding:"4px 12px",borderRadius:8,background:wp>=100?C.seaglass+"14":C.terracotta+"14",fontSize:12,fontWeight:700,color:wp>=100?C.seaglass:C.terracotta}}>{wp}%</span>
            </div>
            <Bar val={wp} color={wp>=100?C.seaglass:wp>=50?C.sage:C.warmGrey} h={5} />
            <div style={{marginTop:18}}>
              {GROUPS.map(g => {
                const items = WORKFLOW_STEPS.filter(s => s.group === g);
                const done = items.filter(s => b.workflow[s.key]).length;
                return (
                  <div key={g} style={{marginBottom:16}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:3,height:16,borderRadius:2,background:groupColors[g]}} />
                        <span style={{fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:.8}}>{g}</span>
                      </div>
                      <span style={{fontSize:10,fontWeight:600,color:done===items.length?C.seaglass:C.warmGrey}}>{done}/{items.length}</span>
                    </div>
                    {items.map(s => (
                      <div key={s.key} className="check-row">
                        <div style={{width:18,height:18,borderRadius:5,border:`2px solid ${b.workflow[s.key]?C.seaglass:C.divider}`,background:b.workflow[s.key]?C.seaglass:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          {b.workflow[s.key] && <span style={{color:C.white,fontSize:11,fontWeight:700}}>{"\u2713"}</span>}
                        </div>
                        <span style={{fontSize:12,color:b.workflow[s.key]?C.coffee:C.warmGrey}}>{s.label}</span>
                      </div>
                    ))}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* EMAILS */}
        {tab === "emails" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                <span style={{fontFamily:hf,fontSize:22,fontWeight:700,color:C.coffee}}>{b.emailsSent.length}</span>
                <span style={{fontSize:12,color:C.warmGrey}}>of {EMAIL_TEMPLATES.length} sent</span>
              </div>
            </div>
            <Bar val={pCalc(b.emailsSent.length, EMAIL_TEMPLATES.length)} color={C.seaglass} h={4} />
            <div style={{marginTop:16}}>
              {EMAIL_TEMPLATES.map(tmpl => {
                const sent = b.emailsSent.includes(tmpl.id);
                const vr = varReady(tmpl, b.templateVars);
                return (
                  <div key={tmpl.id} className="email-row" style={{borderColor:sent?C.seaglass+"33":!vr.ready?C.cherry+"22":C.divider}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={{width:8,height:8,borderRadius:"50%",background:sent?C.seaglass:C.divider,flexShrink:0}} />
                        <span style={{fontSize:12,fontWeight:600}}>{tmpl.label}</span>
                      </div>
                      <div style={{marginTop:4,marginLeft:16}}>
                        {sent ? <span style={{fontSize:10,color:C.seaglass,fontWeight:600}}>Sent</span> :
                         !vr.ready ? (
                          <div>
                            <span style={{fontSize:10,color:C.cherry,fontWeight:600}}>Missing {vr.total-vr.filled} var{vr.total-vr.filled>1?"s":""}: </span>
                            {tmpl.requiredVars.map(v => {
                              const km = {"Client First Name":"clientFirstName","Preferred Date":"preferredDate","Preferred Location":"preferredLocation","Event Date":"eventDate","Start Time":"startTime","End Time":"endTime","Location":"location","Instructor":"instructor","Total Price":"totalPrice","Deposit Amount":"depositAmount","Deposit Link":"depositLink","Signup Link":"signupLink","Remaining Balance":"remainingBalance","Remaining Balance Link":"remainingBalanceLink","Amount Paid":"amountPaid","Number of Hours":"numberOfHours"};
                              if(km[v] && b.templateVars[km[v]]) return null;
                              return <span key={v} className="var-pill" style={{background:C.cherry+"14",color:C.cherry}}>{`{{${v}}}`}</span>;
                            })}
                          </div>
                        ) : <span style={{fontSize:10,color:C.sage}}>Ready &middot; {vr.total} vars filled</span>}
                      </div>
                    </div>
                    <button className={`send-btn ${sent?"sent":""}`} disabled={sent}>{sent ? "Sent" : "Send"}</button>
                  </div>
                );
              })}
            </div>
            <div style={{background:C.oat,borderRadius:10,padding:"12px 16px",marginTop:14}}>
              <div style={{fontSize:10,color:C.warmGrey,textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>Email Flow</div>
              <div style={{fontSize:11,color:C.coffee,lineHeight:1.5}}>
                "Send" sets trigger on Monday &rarr; Make.com fires &rarr; vars replaced &rarr; sent via events@thestudiopilates.com &rarr; auto-threaded.
              </div>
            </div>
          </div>
        )}

        {/* FINANCIALS */}
        {tab === "financials" && (
          <div>
            {b.total > 0 ? (
              <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:18}}>
                  {[["Total",money(b.total),C.coffee],["Deposit",money(b.deposit),C.sage],["Paid",money(b.paid),C.seaglass],["Remaining",money(b.remaining),b.remaining>0?C.cherry:C.seaglass]].map(([l,v,c],i) => (
                    <div key={i} style={{background:C.oatLight,borderRadius:12,padding:"14px 16px",textAlign:"center"}}>
                      <div style={{fontSize:10,color:C.warmGrey,textTransform:"uppercase",letterSpacing:.8}}>{l}</div>
                      <div style={{fontFamily:hf,fontSize:22,fontWeight:700,color:c,marginTop:4}}>{v}</div>
                    </div>
                  ))}
                </div>
                <div style={{marginBottom:18}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:11,color:C.warmGrey}}>Payment Progress</span>
                    <span style={{fontSize:11,fontWeight:700,color:paidP>=100?C.seaglass:C.terracotta}}>{paidP}%</span>
                  </div>
                  <Bar val={paidP} color={paidP>=100?C.seaglass:C.terracotta} h={6} />
                </div>
                <div style={{fontSize:10,color:C.terracotta,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Links</div>
                {[["Deposit Link",b.depositLink,"Payment page"],["Balance Link",b.balanceLink,"Remaining balance"],["Sign-Up Link",b.signupLink,"Momence booking"]].map(([label,url,desc],i) => (
                  <div key={i} className="link-card">
                    <div style={{width:28,height:28,borderRadius:8,background:url?C.seaglass+"18":C.divider,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <span style={{fontSize:12}}>{url ? "\uD83D\uDD17" : "\u2014"}</span>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:600}}>{label}</div>
                      <div style={{fontSize:10,color:C.warmGrey}}>{url ? desc : "Not created"}</div>
                    </div>
                    {url && <span style={{fontSize:10,color:C.seaglass,fontWeight:600}}>Copy</span>}
                  </div>
                ))}
                {b.hours > 0 && (
                  <div style={{background:C.oatLight,borderRadius:10,padding:"10px 14px",marginTop:10,display:"flex",justifyContent:"space-between"}}>
                    <span style={{fontSize:11,color:C.warmGrey}}>Duration</span>
                    <span style={{fontFamily:hf,fontSize:16,fontWeight:700}}>{b.hours} hr{b.hours!==1?"s":""}</span>
                  </div>
                )}
              </div>
            ) : (
              <div style={{textAlign:"center",padding:40}}>
                <div style={{fontFamily:hf,fontSize:18,color:C.warmGrey}}>No Financial Data</div>
                <div style={{fontSize:12,color:C.warmGrey,marginTop:6}}>Quote not set yet.</div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Footer */}
      <div style={{padding:"14px 24px",borderTop:`1px solid ${C.divider}`,background:C.card,flexShrink:0,display:"flex",gap:10}}>
        <button style={{flex:1,padding:11,borderRadius:10,border:"none",background:C.seaglass,color:C.oat,fontWeight:700,fontSize:12,cursor:"pointer"}}>Send Email</button>
        <button style={{flex:1,padding:11,borderRadius:10,border:`2px solid ${C.terracotta}`,background:"transparent",color:C.terracotta,fontWeight:700,fontSize:12,cursor:"pointer"}}>Edit Details</button>
        <button style={{padding:"11px 14px",borderRadius:10,border:`1px solid ${C.divider}`,background:C.card,color:C.warmGrey,fontWeight:600,fontSize:12,cursor:"pointer"}}>Notes</button>
      </div>
    </div>
  );
};

/* ══════════════════════════════════════════════════════════════════
 * APP — Main dashboard container
 *
 * STATE:
 *   sel      → currently selected buyout (drives DetailPanel)
 *   fBIC     → Ball In Court filter ("All" | "TSP Team" | "Client")
 *   fLoc     → Location filter → board: dropdown_mkzjkhds values
 *   fStaff   → Staff filter → board: assignedTo (new column needed)
 *   search   → text filter on item name
 *   sort     → sort key: eventDate, daysWaiting, status, checklist, name
 *   showDone → toggle to include terminal-state items
 *
 * TERMINAL STATES — "Where Are We Now" status indices that mean "done":
 *   15  = Event Complete (legacy)
 *   105 = (reserved)
 *   157 = Cancelled
 *   17  = Event Cancelled (No Refund) (legacy)
 *   18  = Event Cancelled (Refund) (legacy)
 *   Hidden by default; toggle "Completed" checkbox to show.
 *
 * KPI CARDS (top of dashboard):
 *   Active Buyouts  → count of non-terminal items, split by Ball In Court
 *   This Week       → items with date_mkzjkm1t within 7 days
 *   Needs Attention → items where dw>5 OR track="Running behind"/"Major issue"
 *   Pipeline        → sum of numeric_mkzj1sfj for all active items
 *   Outstanding     → Pipeline minus sum of numeric_mm1v48qj
 *
 * FILTERS: Ball In Court, Location (3 studios), Staff, Search, Sort, Show Completed
 * In production: filter values populated dynamically from board column options.
 * ══════════════════════════════════════════════════════════════════ */
function App() {
  const [sel, setSel] = useState(null);
  const [fBIC, setFBIC] = useState("All");
  const [fLoc, setFLoc] = useState("All");
  const [fStaff, setFStaff] = useState("All");
  const [search, setSearch] = useState("");
  const [sort, setSort] = useState("eventDate");
  const [showDone, setShowDone] = useState(false);

  /* FILTER + SORT LOGIC
   * terminal array = status indices for completed/cancelled items.
   * Sort options map to board data:
   *   eventDate    → date_mkzjkm1t (soonest first, TBD items last)
   *   daysWaiting  → derived from lastAction date (most stale first)
   *   status       → "Where Are We Now" step index (earliest lifecycle first)
   *   checklist    → 16 workflow columns % (most complete first)
   *   name         → item name alphabetical */
  const visible = useMemo(() => {
    const terminal = [15,105,157,17,18];
    return BUYOUTS.filter(b => {
      if(!showDone && terminal.includes(b.si)) return false;
      if(fBIC !== "All" && b.bic !== fBIC) return false;
      if(fLoc !== "All" && b.location !== fLoc) return false;
      if(fStaff !== "All" && b.assignedTo !== fStaff) return false;
      if(search && !b.name.toLowerCase().includes(search.toLowerCase())) return false;
      return true;
    }).sort((a,b) => {
      if(sort === "eventDate") { if(!a.eventDate) return 1; if(!b.eventDate) return -1; return new Date(a.eventDate) - new Date(b.eventDate); }
      if(sort === "daysWaiting") return b.dw - a.dw;
      if(sort === "status") return getStep(a.si) - getStep(b.si);
      if(sort === "checklist") return wfPct(b.workflow) - wfPct(a.workflow);
      if(sort === "name") return a.name.localeCompare(b.name);
      return 0;
    });
  }, [fBIC,fLoc,fStaff,search,sort,showDone]);

  const active = BUYOUTS.filter(b => ![15,105,157,17,18].includes(b.si));
  const totalRev = active.reduce((s,b) => s + b.total, 0);
  const collected = active.reduce((s,b) => s + b.paid, 0);
  const attention = active.filter(b => b.dw > 5 || b.track === "Running behind" || b.track === "Major issue").length;
  const thisWeek = active.filter(b => { const d = daysTo(b.eventDate); return d !== null && d >= 0 && d <= 7; }).length;

  return (
    <div style={{background:C.bg,minHeight:"100vh"}}>
      {/* Nav */}
      <div style={{background:C.coffee,padding:"0 32px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{width:34,height:34,borderRadius:10,background:C.seaglass,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:hf,fontSize:20,fontWeight:700,color:C.oat}}>S</div>
          <div>
            <span style={{fontFamily:hf,fontSize:16,fontWeight:700,color:C.oat}}>The Studio Pilates</span>
            <span style={{fontSize:11,color:C.sky,marginLeft:10,fontWeight:500}}>Buyout Operations</span>
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:12}}>
          <button style={{padding:"8px 18px",borderRadius:8,border:"none",background:C.terracotta,color:C.oat,fontWeight:700,fontSize:12,cursor:"pointer"}}>+ New Buyout</button>
          <div style={{width:34,height:34,borderRadius:10,background:C.terracotta,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:hf,fontWeight:700,fontSize:14,color:C.oat}}>KJ</div>
        </div>
      </div>

      <div style={{padding:"24px 32px",maxWidth:1440,margin:"0 auto"}}>
        {/* KPIs */}
        <div style={{display:"flex",gap:14,marginBottom:24}}>
          <KPI label="Active Buyouts" value={active.length} sub={`${active.filter(b=>b.bic==="TSP Team").length} on you \u00B7 ${active.filter(b=>b.bic==="Client").length} on client`} accent={C.seaglass} />
          <KPI label="This Week" value={thisWeek} sub="events in next 7 days" accent={thisWeek > 0 ? C.sunshine : C.seaglass} />
          <KPI label="Needs Attention" value={attention} sub="overdue or flagged" accent={attention > 0 ? C.cherry : C.seaglass} />
          <KPI label="Pipeline" value={money(totalRev)} sub={`${money(collected)} collected`} accent={C.terracotta} />
          <KPI label="Outstanding" value={money(totalRev - collected)} sub="remaining balance" accent={totalRev - collected > 0 ? C.apricot : C.seaglass} />
        </div>

        {/* Filters */}
        <div style={{display:"flex",gap:8,marginBottom:16,alignItems:"center",flexWrap:"wrap"}}>
          <input type="text" placeholder="Search clients..." value={search} onChange={e => setSearch(e.target.value)}
            style={{padding:"8px 14px",borderRadius:10,border:`1px solid ${C.divider}`,fontSize:12,width:180,outline:"none",background:C.card,color:C.coffee}} />
          {["All","TSP Team","Client"].map(opt => (
            <button key={opt} onClick={() => setFBIC(opt)}
              style={{padding:"6px 14px",borderRadius:20,border:fBIC===opt?"none":`1px solid ${C.divider}`,fontSize:11,fontWeight:700,cursor:"pointer",background:fBIC===opt?(opt==="All"?C.coffee:bicColor(opt)):C.card,color:fBIC===opt?C.oat:C.coffee}}>
              {opt === "TSP Team" ? "Us" : opt}
            </button>
          ))}
          <div style={{width:1,height:20,background:C.divider}} />
          <select value={fLoc} onChange={e => setFLoc(e.target.value)} style={{padding:"6px 12px",borderRadius:10,border:`1px solid ${C.divider}`,fontSize:11,background:C.card,cursor:"pointer"}}>
            <option value="All">All Locations</option>
            <option value="1583 Decatur">1583 Decatur</option>
            <option value="1581 Decatur">1581 Decatur</option>
            <option value="763 Trabert">763 Trabert</option>
          </select>
          <select value={fStaff} onChange={e => setFStaff(e.target.value)} style={{padding:"6px 12px",borderRadius:10,border:`1px solid ${C.divider}`,fontSize:11,background:C.card,cursor:"pointer"}}>
            <option value="All">All Staff</option>
            <option value="Kelly">Kelly</option>
            <option value="Autumn">Autumn</option>
            <option value="Unassigned">Unassigned</option>
          </select>
          <select value={sort} onChange={e => setSort(e.target.value)} style={{padding:"6px 12px",borderRadius:10,border:`1px solid ${C.divider}`,fontSize:11,background:C.card,cursor:"pointer"}}>
            <option value="eventDate">Event Date</option>
            <option value="daysWaiting">Days Waiting</option>
            <option value="status">Lifecycle</option>
            <option value="checklist">Checklist %</option>
            <option value="name">Name</option>
          </select>
          <label style={{fontSize:11,display:"flex",alignItems:"center",gap:5,color:C.warmGrey,cursor:"pointer",marginLeft:4}}>
            <input type="checkbox" checked={showDone} onChange={e => setShowDone(e.target.checked)} style={{accentColor:C.seaglass}} /> Completed
          </label>
        </div>

        {/* Table */}
        <div style={{background:C.card,borderRadius:16,overflow:"hidden",border:`1px solid ${C.divider}55`,boxShadow:"0 1px 8px rgba(40,32,14,.04)"}}>
          {/* Header */}
          <div className="grid-row" style={{padding:"12px 24px",background:C.oat,borderBottom:`1px solid ${C.divider}`}}>
            {["Client","Status","Next Action","Waiting On","Countdown","Sign-Ups","Progress"].map((h,i) => (
              <div key={i} style={{fontSize:10,fontWeight:700,color:C.terracotta,textTransform:"uppercase",letterSpacing:1.2,textAlign:[4,5,6].includes(i)?"center":"left"}}>{h}</div>
            ))}
          </div>
          {/* Rows */}
          {visible.length === 0 ? (
            <div style={{padding:60,textAlign:"center",color:C.warmGrey,fontSize:14}}>No buyouts match your filters.</div>
          ) : visible.map(b => <Row key={b.id} b={b} selected={sel?.id===b.id} onSelect={setSel} />)}
        </div>

        <div style={{marginTop:14,fontSize:11,color:C.warmGrey,textAlign:"center"}}>
          {visible.length} of {BUYOUTS.length} buyouts &middot; The Studio Pilates
        </div>
      </div>

      {sel && (
        <React.Fragment>
          <div onClick={() => setSel(null)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(40,32,14,.3)",zIndex:99}} />
          <DetailPanel b={sel} onClose={() => setSel(null)} />
        </React.Fragment>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById("root"));
</script>
</body>
</html>
